name: Sync Upstream

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

# SYNC_PAT secret required: a Personal Access Token (classic) with `repo` and
# `workflow` scopes, or a fine-grained PAT with Contents + Workflows read-write.
# Without it, pushes that include .github/workflows/ file changes will fail
# because GITHUB_TOKEN cannot create or update workflow files.
# Add the secret via: GitHub repo Settings > Secrets and variables > Actions.
jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT || github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/siteboon/claudecodeui.git

      - name: Fetch fork and upstream
        run: |
          git fetch origin main
          git fetch upstream main

      - name: Merge upstream/main into main
        id: merge
        continue-on-error: true
        run: |
          git checkout -B main origin/main
          git merge --no-edit upstream/main

      - name: Push merged main (no conflicts)
        if: steps.merge.outcome == 'success'
        run: git push origin main

      - name: Resolve conflicts with Claude Code
        if: steps.merge.outcome == 'failure'
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          export PATH="$HOME/.claude/local/bin:$PATH"
          claude -p "There are git merge conflicts from merging upstream/main into this fork's main branch. Resolve all conflicts by keeping changes from both sides when possible. For package.json, preserve both upstream additions and fork-specific customizations (like the 'kiro-sdk' dependency). After resolving, stage all files with 'git add .' and commit with 'git commit --no-edit'." \
          --allowedTools "Bash(git*)" "Bash(cat*)" "Bash(grep*)" "Edit" "Read" \
          --dangerously-skip-permissions \
          --bare

      - name: Create PR with resolved conflicts
        id: create-pr
        if: steps.merge.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto-sync-upstream-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo GeorgeZhiXu/claudecodeui \
            --title "Auto-sync upstream (conflicts resolved by Claude Code)" \
            --body "Automated merge from \`upstream/main\` had conflicts that were resolved by Claude Code." \
            --base main \
            --head "$BRANCH")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Auto-merge PR
        id: auto-merge
        if: steps.merge.outcome == 'failure' && steps.create-pr.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.create-pr.outputs.pr_url }}" --merge --delete-branch

      - name: Log auto-merge failure
        if: steps.auto-merge.outcome == 'failure'
        run: |
          echo "::warning::Auto-merge failed for PR ${{ steps.create-pr.outputs.pr_url }}. The PR remains open for manual review."

      - name: Cleanup stale sync branches
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Delete branches starting with auto-sync-upstream- that are older than 1 day
          # This handles branches left behind by failed runs
          gh api repos/GeorgeZhiXu/claudecodeui/branches --paginate -q '.[].name' | \
          grep "^auto-sync-upstream-" | \
          while read -r branch; do
            # Extract date from branch name auto-sync-upstream-YYYYMMDD...
            BRANCH_DATE=$(echo "$branch" | sed 's/auto-sync-upstream-\([0-9]\{8\}\).*/\1/')
            YESTERDAY=$(date -d "yesterday" +%Y%m%d)
            if [ "$BRANCH_DATE" -lt "$YESTERDAY" ]; then
              echo "Deleting stale branch: $branch"
              gh api -X DELETE "repos/GeorgeZhiXu/claudecodeui/git/refs/heads/$branch" || true
            fi
          done
